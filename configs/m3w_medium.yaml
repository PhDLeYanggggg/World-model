  fde: 1.0
  failure: 0.5
  interaction: 0.25
  occupancy: 0.15
fallback_search:
  confidence_thresholds: [0.0, 0.03, 0.05, 0.1, 0.2]
  gain_thresholds: [0.0, 1.0, 2.0, 5.0, 10.0]
  failure_thresholds: [0.0, 0.05, 0.1, 0.2, 0.35]
