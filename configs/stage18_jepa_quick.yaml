model:
  name: SAM-JEPA-2.5D
  autoregressive_next_token_transformer: false
  pixel_reconstruction: false
  latent_generative_rollout: false
training:
  mode: quick
  max_samples: 650
  ridge_regularization: 0.001
evaluation:
  downstream_heads:
    - baseline_selector
    - failure_predictor
    - goal_predictor
    - correction_specialist

