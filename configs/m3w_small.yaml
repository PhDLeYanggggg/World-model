run_name: m3w_small
mode: small
seed: 27
device: auto
feature_store: data/stage26_sdd_feature_store
output_dir: outputs/m3w
batch_size: 4096
num_workers: 0
jepa_epochs: 1
supervised_epochs: 2
learning_rate: 0.001
weight_decay: 0.0001
hidden_dim: 48
token_dim: 8
latent_dim: 32
transformer_layers: 1
transformer_heads: 2
dropout: 0.1
checkpoint_every: 2
max_train_samples: 40000
max_val_samples: 20000
max_test_samples: 100000
mask_ratio: 0.35
loss_weights:
  fde: 1.0
  failure: 0.4
  interaction: 0.2
  occupancy: 0.1
fallback_search:
  confidence_thresholds: [0.0, 0.05, 0.1, 0.2, 0.35, 0.5]
  gain_thresholds: [0.0, 2.0, 5.0, 10.0, 20.0, 50.0]
  failure_thresholds: [0.0, 0.1, 0.2, 0.4, 0.6, 0.8]
